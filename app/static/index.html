<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diabetes Risk Predictor</title>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --accent:#38bdf8; --text:#e2e8f0; --muted:#94a3b8; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           background: linear-gradient(160deg,#0f172a,#1e293b); color:var(--text); min-height:100vh; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 32px 20px 60px; }
    h1 { font-size: 1.6rem; margin: 0 0 4px; }
    .sub { color: var(--muted); margin: 0 0 24px; font-size: .95rem; }
    .card { background: var(--card); border:1px solid #334155; border-radius:14px; padding:24px; }
    .grid { display:grid; grid-template-columns: repeat(2,1fr); gap:16px; }
    @media (max-width:560px){ .grid{ grid-template-columns:1fr; } }
    label { display:block; font-size:.82rem; color:var(--muted); margin-bottom:6px; }
    input { width:100%; padding:10px 12px; border-radius:8px; border:1px solid #475569;
            background:#0f172a; color:var(--text); font-size:.95rem; }
    input:focus { outline:none; border-color:var(--accent); }
    button { margin-top:22px; width:100%; padding:13px; border:none; border-radius:9px;
             background:var(--accent); color:#0f172a; font-weight:700; font-size:1rem; cursor:pointer; }
    button:hover { filter:brightness(1.08); }
    button:disabled { opacity:.6; cursor:not-allowed; }
    #result { margin-top:22px; border-radius:12px; padding:20px; display:none; text-align:center; }
    #result .pct { font-size:2.6rem; font-weight:800; margin:4px 0; }
    #result .lvl { font-size:1.1rem; font-weight:700; letter-spacing:.5px; }
    .Low { background:#052e1a; border:1px solid #16a34a; color:#4ade80; }
    .Moderate { background:#2e2705; border:1px solid #ca8a04; color:#facc15; }
    .High { background:#2e0808; border:1px solid #dc2626; color:#f87171; }
    .foot { color:var(--muted); font-size:.78rem; margin-top:18px; text-align:center; }
    .bar { height:10px; border-radius:6px; background:#334155; overflow:hidden; margin-top:12px; }
    .bar > span { display:block; height:100%; background:currentColor; width:0; transition:width .5s; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🩺 Intelligent Diabetes Risk Predictor</h1>
    <p class="sub">Enter clinical measurements to estimate diabetes risk. For education/demo only — not medical advice.</p>

    <div class="card">
      <form id="form">
        <div class="grid">
          <div><label>Pregnancies</label><input name="Pregnancies" type="number" value="2" min="0" max="20" required></div>
          <div><label>Glucose (mg/dL)</label><input name="Glucose" type="number" step="0.1" value="120" required></div>
          <div><label>Blood Pressure (mm Hg)</label><input name="BloodPressure" type="number" step="0.1" value="70" required></div>
          <div><label>Skin Thickness (mm)</label><input name="SkinThickness" type="number" step="0.1" value="20" required></div>
          <div><label>Insulin (mu U/ml)</label><input name="Insulin" type="number" step="0.1" value="79" required></div>
          <div><label>BMI (kg/m²)</label><input name="BMI" type="number" step="0.1" value="28.5" required></div>
          <div><label>Diabetes Pedigree Function</label><input name="DiabetesPedigreeFunction" type="number" step="0.001" value="0.45" required></div>
          <div><label>Age (years)</label><input name="Age" type="number" value="33" min="1" max="120" required></div>
        </div>
        <button type="submit" id="btn">Predict Risk</button>
      </form>

      <div id="result">
        <div class="lvl" id="lvl"></div>
        <div class="pct" id="pct"></div>
        <div class="bar"><span id="barfill"></span></div>
        <div class="foot" id="modelInfo"></div>
      </div>
    </div>
    <p class="foot">Powered by a scikit-learn model served via FastAPI.</p>
  </div>

  <script>
    const form = document.getElementById("form");
    const btn = document.getElementById("btn");
    const result = document.getElementById("result");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      btn.disabled = true; btn.textContent = "Predicting…";
      const data = {};
      new FormData(form).forEach((v, k) => data[k] = Number(v));

      try {
        const res = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        if (!res.ok) throw new Error((await res.json()).detail || "Request failed");
        const r = await res.json();

        result.className = r.risk_level;
        result.style.display = "block";
        document.getElementById("lvl").textContent = r.risk_level.toUpperCase() + " RISK";
        document.getElementById("pct").textContent = r.risk_percent + "%";
        const bar = document.getElementById("barfill");
        bar.style.width = r.risk_percent + "%";
        document.getElementById("modelInfo").textContent =
          `Prediction: ${r.prediction === 1 ? "Likely diabetic" : "Not diabetic"} · Model: ${r.model_name}`;
      } catch (err) {
        result.className = "High";
        result.style.display = "block";
        document.getElementById("lvl").textContent = "ERROR";
        document.getElementById("pct").textContent = "—";
        document.getElementById("modelInfo").textContent = err.message;
      } finally {
        btn.disabled = false; btn.textContent = "Predict Risk";
      }
    });
  </script>
</body>
</html>
